# Auto-tag and release on version bump
#
# When a push to main changes the version in package.json,
# automatically creates a git tag (e.g. v3.4.0) and GitHub Release,
# then triggers the publish.yml workflow via workflow_dispatch.
#
# Note: Tag pushes from GITHUB_TOKEN don't trigger downstream workflows
# (GitHub's infinite loop prevention). We work around this by using
# workflow_dispatch, which IS exempt from that restriction.
#
# This eliminates the manual steps of running:
#   git tag v3.4.0 && git push origin v3.4.0 && gh release create v3.4.0

name: Auto-tag and release on version bump

on:
  push:
    branches: [main]
    paths: ['package.json']

permissions:
  contents: write
  actions: write

jobs:
  auto-tag:
    name: Create version tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Check for version change
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS → $CURRENT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change (current: $CURRENT, previous: $PREVIOUS)"
          fi

      - name: Check tag doesn't already exist
        if: steps.version.outputs.changed == 'true'
        id: check-tag
        run: |
          TAG="v${{ steps.version.outputs.current }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist, will create"
          fi

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true' && steps.check-tag.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.current }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true' && steps.check-tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.current }}"
          gh release create "$TAG" --generate-notes --title "$TAG"
          echo "Created GitHub Release: $TAG"

      - name: Trigger npm publish
        if: steps.version.outputs.changed == 'true' && steps.check-tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.current }}"
          gh workflow run publish.yml --ref "$TAG"
          echo "Triggered publish workflow for $TAG"
