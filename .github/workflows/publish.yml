# Publish to npm
#
# Publishes the package to npm when a version tag is pushed.
# Uses NPM_TOKEN (GitHub Actions secret) for authentication.
#
# Triggers:
# 1. Tag push (manual): git push origin v3.4.1
# 2. workflow_dispatch (from auto-tag.yml): gh workflow run publish.yml --ref v3.4.1
#    GitHub exempts workflow_dispatch from the GITHUB_TOKEN trigger restriction,
#    so auto-tag can chain into publish without needing a PAT.
#
# Prerequisites:
# 1. Set NPM_TOKEN as a GitHub Actions secret (granular access token from npmjs.com)
#
# Future: migrate to OIDC trusted publishing when npmjs.com trusted publisher
# is configured (org=littlebearapps, repo=outlook-assistant, workflow=publish.yml)
# and Node 24+ (npm 11.5.1+) is used. See OIDC migration notes below.
#
# Note: This workflow uses no untrusted input in run commands.

name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write # Required for provenance attestation
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        run: |
          sleep 10
          npm view @littlebearapps/outlook-assistant version
